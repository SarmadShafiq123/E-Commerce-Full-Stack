<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title & description (overridden per-page by react-helmet-async) -->
    <title>Luxe Bags — Premium Handcrafted Leather Bags</title>
    <meta name="description" content="Discover handcrafted luxury bags — handbags, tote bags, clutches, shoulder bags and more. Premium leather goods crafted for the discerning collector." />
    <meta name="robots" content="index,follow" />

    <!-- Default Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Luxe Bags" />
    <meta property="og:title"       content="Luxe Bags — Premium Handcrafted Leather Bags" />
    <meta property="og:description" content="Discover handcrafted luxury bags — handbags, tote bags, clutches, shoulder bags and more." />
    <meta property="og:image"       content="https://luxebags.store/og-default.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Luxe Bags — Premium Handcrafted Leather Bags" />
    <meta name="twitter:description" content="Discover handcrafted luxury bags — handbags, tote bags, clutches, shoulder bags and more." />
    <meta name="twitter:image"       content="https://luxebags.store/og-default.jpg" />

    <!-- Theme color -->
    <meta name="theme-color" content="#1A1A1A" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Preload hero image (above the fold on home page) -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=800&q=80"
      fetchpriority="high"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Canonical (overridden per-page) -->
    <link rel="canonical" href="https://luxebags.store/" />

    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
